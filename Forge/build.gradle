        // get pulled in via remap.
        include 'net/minecraft/src/FCUtilsWorld.class'
        include 'net/minecraft/src/FCUtilsMisc.class'
        // Vanilla EntityLiving references CombatTracker to record damage
        // events used by death messages and statistics. CombatTracker
        // depends on DamageSource — we leave DamageSource as Modern-
        // Common's stub (compatible signature).
        include 'net/minecraft/src/CombatTracker.class'
        include 'net/minecraft/src/CombatEntry.class'
        // Vanilla EntityLiving constructor creates EntityBodyHelper.
        // Modern-Common has no stub, so include vanilla's directly.
        include 'net/minecraft/src/EntityBodyHelper.class'
        // Vanilla EntityLiving.CheckForHeadDrop() and .attackEntityFrom()
        // reference FCDamageSourceCustom static fields (m_DamageSourceChoppingBlock
        // etc.). The vanilla 1.5.2 class is a flat DamageSource subclass;
        // it depends only on DamageSource (already stubbed in Modern-Common).
        include 'net/minecraft/src/FCDamageSourceCustom.class'
        // Vanilla EntityMob implements IMob. IMob has a static-final
        // FilterIMob field. Both must be present so EntityMob loads.
        include 'net/minecraft/src/IMob.class'
        include 'net/minecraft/src/FilterIMob.class'
        // Tag interfaces implemented by various vanilla 1.5.2 mob classes:
        //   - IBossDisplayData: EntityWither, EntityDragon
        //   - INpc, IMerchant: EntityVillager
        // Without them the mob classes fail to link.
        include 'net/minecraft/src/IBossDisplayData.class'
        include 'net/minecraft/src/INpc.class'
        include 'net/minecraft/src/IMerchant.class'
        // Projectile subclasses referenced by vanilla mob classes:
        //   - EntitySmallFireball: EntityBlaze.shoots, EntityGhast hit code
        //   - EntityLargeFireball: EntityGhast.shoots
        //   - EntityWitherSkull:   EntityWither.shoots
        //   - FCEntityWitherSkull: vanilla EntityWither.java:479 directly
        //     instantiates this FC subclass via `new FCEntityWitherSkull(...)`
        include 'net/minecraft/src/EntitySmallFireball.class'
        include 'net/minecraft/src/EntityLargeFireball.class'
        include 'net/minecraft/src/EntityWitherSkull.class'
        // Vanilla 1.5.2 has FCMOD-patched subclass relationships where the
        // original vanilla class extends an FC subclass:
        //   - EntityMooshroom extends FCEntityCow
        //   - EntityPigZombie extends FCEntityZombie
        //   - EntityMagmaCube extends FCEntitySlime
        // So when we swap the vanilla parent, we MUST also bring in the
        // FCEntity* version to satisfy the linker. Plus EntityWither has
        // EntityWitherAttackFilter as a static-final field. The shotgun
        // include below brings in every FCEntity*.class from Src/ — they
        // all relocate cleanly into btw.modern.* and only depend on classes
        // we already have.
        include 'net/minecraft/src/FCEntity*.class'
        include 'net/minecraft/src/EntityWitherAttackFilter.class'
        // EntitySheep instantiates `new ContainerSheep(this)` for crafting.
        // Container itself is a Modern-Common stub; ContainerSheep is a
        // tiny vanilla subclass of Container.
        include 'net/minecraft/src/ContainerSheep.class'
        // Thrown projectile subclasses spawned by various mobs:
        //   - EntitySnowball: EntitySnowman
        //   - EntityEgg: EntityChicken (random egg drop)
        //   - EntityEnderPearl: EntityEnderman
        //   - EntityExpBottle: villager XP throw
        include 'net/minecraft/src/EntitySnowball.class'
        include 'net/minecraft/src/EntityEgg.class'
        include 'net/minecraft/src/EntityEnderPearl.class'
        include 'net/minecraft/src/EntityExpBottle.class'
        // Tuple is a small generic pair helper used by EntityVillager's
        // trade randomizer (and some other vanilla 1.5.2 code).
        include 'net/minecraft/src/Tuple.class'
        // ChunkCache is a read-only IBlockAccess used by PathFinder for
        // A* pathfinding. Vanilla World.getEntityPathToXYZ creates one
        // and passes it to PathFinder.createEntityPathTo.
        // Path is the internal priority queue used by PathFinder.
        include 'net/minecraft/src/ChunkCache.class'
        include 'net/minecraft/src/Path.class'
        // Model rendering: vanilla 1.5.2 ModelBox/TexturedQuad compute UV
        // coordinates correctly for the 64x32 texture layout. The Modern-
        // Common ModelRenderer uses these instead of hand-calculating UVs.
        include 'net/minecraft/src/ModelBox.class'
        include 'net/minecraft/src/TexturedQuad.class'
        include 'net/minecraft/src/PositionTextureVertex.class'
        // Container classes for GUI system — FC's displayGUI* methods
        // create these containers which get wrapped by FCContainerMenu.
        include 'net/minecraft/src/ContainerMerchant.class'
        include 'net/minecraft/src/ContainerFurnace.class'
        include 'net/minecraft/src/ContainerDispenser.class'
        include 'net/minecraft/src/ContainerHopper.class'
        include 'net/minecraft/src/ContainerBrewingStand.class'
        include 'net/minecraft/src/ContainerBeacon.class'
        include 'net/minecraft/src/ContainerRepair.class'
        include 'net/minecraft/src/ContainerEnchantment.class'
        include 'net/minecraft/src/ContainerChest.class'
        // Supporting classes for containers
        include 'net/minecraft/src/InventoryMerchant.class'
        include 'net/minecraft/src/SlotMerchantResult.class'
        include 'net/minecraft/src/SlotFurnace.class'
        include 'net/minecraft/src/SlotBrewingStandPotion.class'
        include 'net/minecraft/src/SlotBrewingStandIngredient.class'
        include 'net/minecraft/src/SlotArmor.class'
        include 'net/minecraft/src/SlotCrafting.class'
        // Server-side twins of the client-block additions above (see comments there)
        include 'net/minecraft/src/EnchantmentProtection.class'
        include 'net/minecraft/src/EnchantmentThorns.class'
        include 'net/minecraft/src/EntityHanging.class'
        include 'net/minecraft/src/EntityMinecartEmpty.class'
        include 'net/minecraft/src/EntityMinecartChest.class'
        include 'net/minecraft/src/EntityMinecartFurnace.class'
        include 'net/minecraft/src/EntityMinecartHopper.class'
        include 'net/minecraft/src/EntityMinecartTNT.class'
        include 'net/minecraft/src/EntityMinecartMobSpawner.class'
        include 'net/minecraft/src/EntityMinecartContainer.class'
        include 'net/minecraft/src/EntityMinecartMobSpawnerLogic.class'
        include 'net/minecraft/src/MobSpawnerBaseLogic.class'
        include 'net/minecraft/src/WeightedRandomMinecart.class'
        include 'net/minecraft/src/CallableEffect*.class'
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    // The frozen 1.5.2 artifact (build/classes/java/{main,server}) was compiled
    // BEFORE the FC source restructure, so its bytecode references FLAT FC names
    // (net.minecraft.src.FCX). The general rule below would relocate those to
    // btw.modern.FCX — classes that do not exist. Map each flat name that a
    // LOADABLE frozen class references to its restructured home instead, so the
    // frozen bytecode links against the live FC classes. Specific rules must
    // precede the general net.minecraft.src rule (first match wins).
    // (Member signatures verified identical on both sides — link audit 2026-07-08.)
    relocate 'net.minecraft.src.FCBetterThanWolves', 'net.minecraft.src.btw.core.FCBetterThanWolves'
    relocate 'net.minecraft.src.FCUtilsItem', 'net.minecraft.src.btw.util.FCUtilsItem'
    relocate 'net.minecraft.src.FCUtilsRandomPositionGenerator', 'net.minecraft.src.btw.util.FCUtilsRandomPositionGenerator'
    relocate 'net.minecraft.src.FCBlockSilverfish', 'net.minecraft.src.btw.block.FCBlockSilverfish'
    relocate 'net.minecraft.src.FCBlockMycelium', 'net.minecraft.src.btw.block.FCBlockMycelium'
    relocate 'net.minecraft.src.FCBlockGroundCover', 'net.minecraft.src.btw.block.FCBlockGroundCover'

    relocate 'btw.api', 'btw.modern'
    // Remap vanilla MC 1.5.2 classes (Entity, EntityAI*, PathNavigate, etc.)
    // into btw.modern.* so FC code can reach the REAL vanilla AI
    // implementations rather than dead Modern-Common stubs.
    // Exclude net.minecraft.src.btw.** — those are FC's own packages
    // and must stay at their original location.
    relocate('net.minecraft.src', 'btw.modern') {
        exclude 'net.minecraft.src.btw.**'
    }
    // Remap GL11 calls in FC code to our no-op stub. FC CLIENT code calls
    // org.lwjgl.opengl.GL11.glTranslatef etc. for display transforms, but
    // MC 1.20.1 uses a core GL profile where these fixed-function calls
    // cause a fatal JVM abort. Our btw.modern.GL11 is a safe no-op.
    relocate 'org.lwjgl.opengl.GL11', 'btw.modern.GL11'
    configurations = []
}

remapFcCode.dependsOn ':Api:compileJava', ':Common:compileJava', ':Client:compileJava', ':Server:compileJava'

// Extract remapped JAR into fc source set so ForgeGradle's classloader loads it.
// Sync (not Copy) from exactly the current archive: Copy over a *.jar glob
// used to merge every stale versioned jar in build/remapped first-in-wins,
// and never purged classes deleted from the remap — dev ran old bytecode.
task extractFcClasses(type: Sync) {
    dependsOn remapFcCode
    from { zipTree(remapFcCode.archiveFile) }
    into sourceSets.fc.output.classesDirs.files.first()
}

// Wire task dependencies
tasks.matching { it.name.startsWith('prepareRun') || it.name.startsWith('run') || it.name == 'classes' }.configureEach {
    dependsOn extractFcClasses
}

// ------------------------------------------------------------------
// Force-delete Modern-Common's btw.modern.Entity / AxisAlignedBB stubs
// from its build output so dev-mode classloader uses FC's vanilla
// versions instead. The JAR-side `exclude` directives only affect the
// built JAR; in dev (runClient/runServer), Modern-Common's classes are
// added to the runtime classpath directly from its build output dir,
// and ForgeGradle does NOT honor `mods { source ... }` declaration
// order for class precedence — first-found-wins. Deleting Modern-
// Common's .class files leaves only FC's `btw/modern/Entity.class`
// in the classpath, so it wins by default.
//
// FC's vanilla 1.5.2 Entity has the full moveEntity collision-clip
// algorithm. We deliberately use it instead of porting/stubbing.
// ------------------------------------------------------------------
task removeModernCommonShadowedClasses {
    dependsOn ':Modern-Common:compileJava'
    doLast {
        def base = file("${project(':Modern-Common').buildDir}/classes/java/main/btw/modern")
        ['Entity.class', 'EntityLiving.class', 'EntityCreature.class', 'EntityMob.class',
         'EntityAgeable.class', 'EntityAnimal.class',
         // Concrete mob/animal classes — see remapFcCode for the rationale
         // (vanilla 1.5.2 EntityAgeable's m_fAdultWidth=-1 sentinel must be
         // overwritten by setSize from the subclass constructor).
         'EntityPig.class', 'EntityCow.class', 'EntitySheep.class',
         'EntityChicken.class', 'EntityWolf.class', 'EntityOcelot.class',
         'EntityMooshroom.class', 'EntityVillager.class',
         'EntityZombie.class', 'EntitySkeleton.class', 'EntityCreeper.class',
         'EntityEnderman.class', 'EntitySpider.class', 'EntityCaveSpider.class',
         'EntityWitch.class', 'EntityPigZombie.class', 'EntityWither.class',
         'EntitySlime.class', 'EntityMagmaCube.class', 'EntityGhast.class',
         'EntityBlaze.class', 'EntitySilverfish.class',
         'EntityBat.class', 'EntitySquid.class',
         'EntitySnowman.class', 'EntityIronGolem.class',
         'EntityAmbientCreature.class', 'EntityWaterMob.class',
         'EntityGolem.class', 'EntityFlying.class', 'EntityTameable.class',
         'EntityArrow.class', 'EntityBoat.class', 'EntityFX.class', 'EntityFallingSand.class',
         'EntityFireball.class', 'EntityFishHook.class', 'EntityItem.class', 'EntityMinecart.class',
         'EntityMinecartHopper.class',
         'EntityPainting.class', 'EntityTNTPrimed.class', 'EntityThrowable.class',
         'EntityWeatherEffect.class', 'EntityXPOrb.class', 'FCEntityLightningBolt.class',
         // Movement / AI / pathfinding helpers — these are in the remap
         // include list AND excluded from the dist jar, but Modern-Common's
         // stubs are still on the dev classpath. ForgeGradle's dev
         // classloader doesn't honor source-set declaration order for
         // class precedence, so we delete the stubs here too.
         'PathNavigate.class', 'PathEntity.class', 'PathPoint.class',
         'PathFinder.class', 'RandomPositionGenerator.class',
         'EntityMoveHelper.class', 'EntityJumpHelper.class',
         'EntityLookHelper.class',
         // Frozen EntityTameable needs the real EntityAISit(EntityTameable) ctor
         'EntityAISit.class',
         // Projectile classes already remapped but stub still on dev classpath
         // (EntityLightningBolt removed: Modern-Common has no such class — the
         // entry was a no-op; btw.modern.EntityLightningBolt comes only from fc)
         'EntityLargeFireball.class', 'EntityWitherSkull.class',
         'EntityEgg.class',
         // ChunkCache — vanilla PathFinder uses methods on ChunkCache
         // (doesBlockHaveSolidTopSurface, etc.) that the stub lacks.
         'ChunkCache.class',
         // Model rendering: the dist jar already excludes these so FC's real
         // 1.5.2 versions win (correct UVs). Delete the Modern-Common stubs in
         // dev too so dev matches the jar's class binding. ModelBox/TexturedQuad/
         // PositionTextureVertex are a self-contained cluster; ModelRenderer (the
         // only boundary, single-sourced) uses the 10-arg ModelBox ctor that both
         // versions share — the jar already binds MC ModelRenderer to FC ModelBox.
         'ModelBox.class', 'TexturedQuad.class', 'PositionTextureVertex.class'].each { name ->
            def f = file("$base/$name")
            if (f.exists()) {
                logger.lifecycle("Removing Modern-Common shadowed class: $name")
                f.delete()
            }
        }
    }
}

// ------------------------------------------------------------------
// ASM bytecode patch: open up access on FC's vanilla 1.5.2 Entity.
//
// FC code was compiled against Modern-Common's Entity stub, which had
// `public` fields. Vanilla 1.5.2 Entity has many `protected` fields
// (rand, fire, fireResistance, etc.). When FC subclasses access these
// via bytecode `getfield btw/modern/Entity.field` where the stack type
// is `Entity` (not the subclass), the JVM verifier rejects it as
// "Bad access to protected data in getfield" — even when the accessor
// IS technically a subclass, because verifier strict type tracking
// requires the stack top to be the subclass type, not Entity itself.
//
// The fix is to promote all Entity fields and methods to `public` via
// ASM, so the protected-access verifier check doesn't apply. This runs
// AFTER extractFcClasses so it operates on the remapped btw/modern/Entity.class.
// ------------------------------------------------------------------
task openUpEntityAccess {
    dependsOn extractFcClasses
    doLast {
        ['Entity.class', 'EntityLiving.class', 'EntityCreature.class', 'EntityMob.class',
         'EntityAgeable.class', 'EntityAnimal.class',
         // Concrete mob/animal classes — see remapFcCode for the rationale
         // (vanilla 1.5.2 EntityAgeable's m_fAdultWidth=-1 sentinel must be
         // overwritten by setSize from the subclass constructor).
         'EntityPig.class', 'EntityCow.class', 'EntitySheep.class',
         'EntityChicken.class', 'EntityWolf.class', 'EntityOcelot.class',
         'EntityMooshroom.class', 'EntityVillager.class',
         'EntityZombie.class', 'EntitySkeleton.class', 'EntityCreeper.class',
         'EntityEnderman.class', 'EntitySpider.class', 'EntityCaveSpider.class',
         'EntityWitch.class', 'EntityPigZombie.class', 'EntityWither.class',
         'EntitySlime.class', 'EntityMagmaCube.class', 'EntityGhast.class',
         'EntityBlaze.class', 'EntitySilverfish.class',
         'EntityBat.class', 'EntitySquid.class',
         'EntitySnowman.class', 'EntityIronGolem.class',
         'EntityAmbientCreature.class', 'EntityWaterMob.class',
         'EntityGolem.class', 'EntityFlying.class', 'EntityTameable.class',
         'EntityArrow.class', 'EntityBoat.class', 'EntityFX.class', 'EntityFallingSand.class',
         'EntityFireball.class', 'EntityFishHook.class', 'EntityItem.class', 'EntityMinecart.class',
         'EntityPainting.class', 'EntityTNTPrimed.class', 'EntityThrowable.class',
         'EntityWeatherEffect.class', 'EntityXPOrb.class', 'FCEntityLightningBolt.class',
         // AI task base classes — FC subclasses (FCEntityAI*) in
         // net.minecraft.src.btw.entity access protected fields on these
         // parent classes (remapped to btw.modern.*). Without promotion,
         // the module system throws IllegalAccessError every tick.
         'EntityAIAttackOnCollide.class', 'EntityAITarget.class',
         'EntityAINearestAttackableTarget.class', 'EntityAIHurtByTarget.class',
         'EntityAIMoveTwardsRestriction.class', 'EntityAIMoveThroughVillage.class',
         'EntityAIWatchClosest.class', 'EntityAILookIdle.class',
         'EntityAISwimming.class', 'EntityAIMate.class',
         'EntityAIFollowParent.class', 'EntityAIWander.class',
         'EntityAIControlledByPlayer.class',
         // Navigation / helper classes accessed cross-package by FC code
         'PathNavigate.class', 'EntityLookHelper.class', 'EntityMoveHelper.class',
         'EntityJumpHelper.class', 'EntityBodyHelper.class',
         'PathFinder.class', 'ChunkCache.class',
         'CombatTracker.class', 'CombatEntry.class'].each { fileName ->
            def classFile = file("${buildDir}/classes/java/fc/btw/modern/${fileName}")
            if (!classFile.exists()) {
                logger.warn("openUpEntityAccess: ${classFile} not found — skipping")
                return
            }
            byte[] input = classFile.bytes
            ClassReader reader = new ClassReader(input)
            ClassWriter writer = new ClassWriter(0)
            reader.accept(new ClassVisitor(Opcodes.ASM9, writer) {
                @Override
                FieldVisitor visitField(int access, String name, String desc, String sig, Object value) {
                    int newAccess = (access & ~(Opcodes.ACC_PROTECTED | Opcodes.ACC_PRIVATE)) | Opcodes.ACC_PUBLIC
                    return super.visitField(newAccess, name, desc, sig, value)
                }
                @Override
                MethodVisitor visitMethod(int access, String name, String desc, String sig, String[] exceptions) {
                    int newAccess = access
                    if (!name.equals("<init>") && !name.equals("<clinit>")) {
                        newAccess = (access & ~(Opcodes.ACC_PROTECTED | Opcodes.ACC_PRIVATE)) | Opcodes.ACC_PUBLIC
                    }
                    return super.visitMethod(newAccess, name, desc, sig, exceptions)
                }
            }, 0)
            classFile.bytes = writer.toByteArray()
            logger.lifecycle("Patched ${classFile.name}: all fields/methods promoted to public")
        }
    }
}

// ------------------------------------------------------------------
// ASM bytecode patch #2: widen pre-restructure FC hook descriptors.
//
// The frozen 1.5.2 artifact predates the hook-widening now present in
// vanilla/ — it declares Entity.OnKickedByCow(FCEntityCow),
// OnFlungBySquidTentacle(FCEntitySquid), OnStruckByLightning(FCEntity-
// LightningBolt) and OnHeadCrabbedBySquid(FCEntitySquid) with narrow
// FC-subclass params. Live restructured FC callers (FCEntityCow.java:551,
// FCEntitySquid.java:884/1278, FCEntityLightningBolt.java:100) compile
// against the widened Api hooks and emit (Lbtw/modern/Entity;)V — a
// descriptor that does not exist on the frozen classes: NoSuchMethodError
// the first time a cow kick or squid attack connects.
//
// Fix: widen the frozen declarations on the loaded base hierarchy
// (Entity, EntityLiving, EntityAnimal) and rewrite the narrow call sites
// (FCEntityLightningBolt.onUpdate is the only one). Bytecode-verified
// safe: every body uses the param only as Entity — except EntityAnimal,
// which passes it to DamageSource.causeMobDamage(EntityLiving), so a
// CHECKCAST EntityLiving is injected after each param load there (all
// real callers pass EntityLiving subclasses, the cast always succeeds).
// StackMapTable check: only Entity.OnStruckByLightning has frames, all
// 'same'-type (no local types recorded), so ClassWriter(0) is safe.
// Flat FCEntityCreeper/Pig/Zombie keep narrow overrides — they are
// shadowed by Modern-Common stubs / dead code and never dispatch.
// ------------------------------------------------------------------
task widenFcHookDescriptors {
    dependsOn extractFcClasses
    doLast {
        def hookNames = ['OnKickedByCow', 'OnFlungBySquidTentacle',
                         'OnStruckByLightning', 'OnHeadCrabbedBySquid'] as Set
        def narrowDesc = ~/\(Lbtw\/modern\/FCEntity[^;]*;\)V/
        def wideDesc = '(Lbtw/modern/Entity;)V'

        // (a) widen declarations; EntityAnimal additionally gets checkcasts
        ['Entity.class', 'EntityLiving.class', 'EntityAnimal.class'].each { fileName ->
            def classFile = file("${buildDir}/classes/java/fc/btw/modern/${fileName}")
            if (!classFile.exists()) {
                logger.warn("widenFcHookDescriptors: ${classFile} not found — skipping")
                return
            }
            boolean needsCast = fileName == 'EntityAnimal.class'
            ClassReader reader = new ClassReader(classFile.bytes)
            ClassWriter writer = new ClassWriter(0)
            reader.accept(new ClassVisitor(Opcodes.ASM9, writer) {
                @Override
                MethodVisitor visitMethod(int access, String name, String desc, String sig, String[] exceptions) {
                    if (hookNames.contains(name) && desc ==~ narrowDesc) {
                        logger.lifecycle("Widened ${fileName} ${name}${desc} -> ${wideDesc}")
                        MethodVisitor mv = super.visitMethod(access, name, wideDesc, sig, exceptions)
                        if (!needsCast) {
                            return mv
                        }
                        return new MethodVisitor(Opcodes.ASM9, mv) {
                            @Override
                            void visitVarInsn(int opcode, int varIdx) {
                                super.visitVarInsn(opcode, varIdx)
                                if (opcode == Opcodes.ALOAD && varIdx == 1) {
                                    super.visitTypeInsn(Opcodes.CHECKCAST, 'btw/modern/EntityLiving')
                                }
                            }
                        }
                    }
                    return super.visitMethod(access, name, desc, sig, exceptions)
                }
            }, 0)
            classFile.bytes = writer.toByteArray()
        }

        // (b) rewrite narrow call sites anywhere in the fc output
        fileTree(dir: "${buildDir}/classes/java/fc", include: '**/*.class').each { f ->
            boolean[] changed = [false]
            ClassReader reader = new ClassReader(f.bytes)
            ClassWriter writer = new ClassWriter(0)
            reader.accept(new ClassVisitor(Opcodes.ASM9, writer) {
                @Override
                MethodVisitor visitMethod(int access, String name, String desc, String sig, String[] exceptions) {
                    return new MethodVisitor(Opcodes.ASM9, super.visitMethod(access, name, desc, sig, exceptions)) {
                        @Override
                        void visitMethodInsn(int opcode, String owner, String mName, String mDesc, boolean isInterface) {
                            if (hookNames.contains(mName) && mDesc ==~ narrowDesc) {
                                changed[0] = true
                                super.visitMethodInsn(opcode, owner, mName, wideDesc, isInterface)
                            } else {
                                super.visitMethodInsn(opcode, owner, mName, mDesc, isInterface)
                            }
                        }
                    }
                }
            }, 0)
            if (changed[0]) {
                f.bytes = writer.toByteArray()
                logger.lifecycle("Rewrote narrow FC hook call site(s) in ${f.name}")
            }
        }
    }
}
openUpEntityAccess.dependsOn widenFcHookDescriptors

tasks.matching { it.name.startsWith('prepareRun') || it.name.startsWith('run') || it.name == 'classes' || it.name == 'jar' }.configureEach {
    dependsOn openUpEntityAccess
}
// IMPORTANT: removeModernCommonShadowedClasses is DESTRUCTIVE — it deletes
// .class files from Modern-Common's *shared* compile output. It must be
// wired ONLY to the dev-run tasks (prepareRun*/run*), where the
// ForgeGradle classloader resolves duplicate btw.modern.* classes
// first-found-wins and the physical deletion is the only way to make the
// FC remapped versions win.
//
// It must NOT be wired to `classes` or `jar`: the `jar` task already
// excludes every shadowed class from Modern-Common's output AND pulls the
// FC versions from sourceSets.fc.output (see the jar { } block), so the
// JAR is correct without the deletion. Wiring it to `classes`/`jar`
// previously corrupted Modern-Common's output during the publish path —
// a subsequent :Forge:compileJava then failed with 200+
// "cannot access btw.modern.EntityLiving" errors because Modern-Common
// was "up-to-date" and never regenerated the deleted stubs.
tasks.matching { it.name.startsWith('prepareRun') || it.name.startsWith('run') }.configureEach {
    dependsOn removeModernCommonShadowedClasses
}

// ------------------------------------------------------------------
// Bundle dependent modules into the distributable jar.
//
// In dev (runClient/runServer) the Modern-Common, Api, and remapped FC
// classes are injected into the mod container via the `mods { source
// sourceSets... }` block. A standalone jar dropped into a player's
// mods/ folder does not get that treatment, so we must copy those class
// trees INTO the jar at build time.
// ------------------------------------------------------------------
jar {
    dependsOn ':Api:jar', ':Modern-Common:jar', extractFcClasses

    // Populate JAR manifest with version info. Forge's mods.toml
    // placeholder ${file.jarVersion} reads Implementation-Version.
    manifest {
        attributes([
            'Specification-Title'     : project.portArchiveName,
            'Specification-Vendor'    : 'Better Than Wolves Port',
            'Specification-Version'   : '1',
            'Implementation-Title'    : project.portArchiveName,
            'Implementation-Version'  : project.portVersion,
            'Implementation-Vendor'   : 'Better Than Wolves Port',
            'Implementation-Timestamp': new Date().format('yyyy-MM-dd\'T\'HH:mm:ssZ'),
            'BTW-Upstream-Version'    : project.btwVersion,
            'BTW-Upstream-MC-Version' : project.mcVersion,
            'BTW-Target-MC-Version'   : project.portMcVersion,
            'MixinConfigs'            : 'betterthanwolves.mixins.json',
        ])
    }

    // Modern-Common FIRST: provides bridge stubs for core types (Entity,
    // EntityLiving, World, Block, etc.) that have bridge-specific methods.
    // DuplicatesStrategy.EXCLUDE means first-in wins, so bridge stubs
    // take precedence over the remapped vanilla classes for types where
    // both exist.
    //
    // Modern-Common bridge stubs load first. For classes where both
    // Modern-Common and remapped vanilla exist, Modern-Common wins
    // (DuplicatesStrategy.EXCLUDE). This is intentional for classes
    // with bridge-specific constructors (e.g. EntityAITasks no-arg).
    //
    // Exclude stubs whose vanilla versions have MATCHING constructor
    // signatures and BETTER implementations (real A* pathfinding, etc.).
    from(project(':Modern-Common').sourceSets.main.output) {
        exclude 'btw/api/**'
        // Let vanilla versions win for classes with MATCHING constructors
        // and better implementations. Keep Modern-Common's versions only for
        // classes where the bridge uses a different constructor signature
        // (e.g. EntitySenses no-arg; vanilla needs an entity arg). NOTE:
        // EntityLookHelper is NOT kept here — the runtime EntityLiving is FC's
        // (Modern-Common's EntityLiving is excluded below), and it calls
        // new EntityLookHelper(this); Modern-Common's look helper is an empty
        // stub, so FC's real one must win.
        exclude 'btw/modern/PathNavigate.class'
        exclude 'btw/modern/PathEntity.class'
        exclude 'btw/modern/PathPoint.class'
        exclude 'btw/modern/PathFinder.class'
        exclude 'btw/modern/EntityMoveHelper.class'
        exclude 'btw/modern/EntityJumpHelper.class'
        // Frozen EntityTameable's field initializer news EntityAISit(EntityTameable);
        // the Modern-Common shim only has an (EntityLiving) ctor, so every FC wolf
        // construction threw NoSuchMethodError (silently caught — wolves were inert
        // husks). The real 1.5.2 EntityAISit is already in the remap via EntityAI*.
        exclude 'btw/modern/EntityAISit.class'
        // FC's vanilla 1.5.2 Entity/EntityLiving own collision and
        // mob state. Exclude Modern-Common's stubs so FC's versions
        // win in the JAR. Access-level issues are resolved by ASM
        // promotion in openUpEntityAccess. AxisAlignedBB stays
        // Modern-Common because vanilla's constructor is protected.
        exclude 'btw/modern/Entity.class'
        exclude 'btw/modern/EntityLiving.class'
        exclude 'btw/modern/EntityCreature.class'
        exclude 'btw/modern/EntityMob.class'
        exclude 'btw/modern/EntityAgeable.class'
        exclude 'btw/modern/EntityAnimal.class'
        exclude 'btw/modern/EntityPig.class'
        exclude 'btw/modern/EntityCow.class'
        exclude 'btw/modern/EntitySheep.class'
        exclude 'btw/modern/EntityChicken.class'
        exclude 'btw/modern/EntityWolf.class'
        exclude 'btw/modern/EntityOcelot.class'
        exclude 'btw/modern/EntityMooshroom.class'
        exclude 'btw/modern/EntityVillager.class'
        exclude 'btw/modern/EntityZombie.class'
        exclude 'btw/modern/EntitySkeleton.class'
        exclude 'btw/modern/EntityCreeper.class'
        exclude 'btw/modern/EntityEnderman.class'
        exclude 'btw/modern/EntitySpider.class'
        exclude 'btw/modern/EntityCaveSpider.class'
        exclude 'btw/modern/EntityWitch.class'
        exclude 'btw/modern/EntityPigZombie.class'
        exclude 'btw/modern/EntityWither.class'
        exclude 'btw/modern/EntitySlime.class'
        exclude 'btw/modern/EntityMagmaCube.class'
        exclude 'btw/modern/EntityGhast.class'
        exclude 'btw/modern/EntityBlaze.class'
        exclude 'btw/modern/EntitySilverfish.class'
        exclude 'btw/modern/EntityBat.class'
        exclude 'btw/modern/EntitySquid.class'
        exclude 'btw/modern/EntitySnowman.class'
        exclude 'btw/modern/EntityIronGolem.class'
        exclude 'btw/modern/EntityAmbientCreature.class'
        exclude 'btw/modern/EntityWaterMob.class'
        exclude 'btw/modern/EntityGolem.class'
        exclude 'btw/modern/EntityFlying.class'
        exclude 'btw/modern/EntityTameable.class'
        exclude 'btw/modern/EntityArrow.class'
        exclude 'btw/modern/EntityBoat.class'
        exclude 'btw/modern/EntityFX.class'
        exclude 'btw/modern/EntityFallingSand.class'
        exclude 'btw/modern/EntityFireball.class'
        exclude 'btw/modern/EntityFishHook.class'
        exclude 'btw/modern/EntityItem.class'
        exclude 'btw/modern/EntityMinecart.class'
        exclude 'btw/modern/EntityMinecartHopper.class'
        exclude 'btw/modern/EntityPainting.class'
        exclude 'btw/modern/EntityTNTPrimed.class'
        exclude 'btw/modern/EntityThrowable.class'
        exclude 'btw/modern/EntityWeatherEffect.class'
        exclude 'btw/modern/EntityXPOrb.class'
        exclude 'btw/modern/FCEntityLightningBolt.class'
        // Reconcile with removeModernCommonShadowedClasses (dev): these collide
        // and the FC version is authoritative, but were previously only deleted
        // in dev — so the Modern-Common stub shipped in the jar and shadowed FC
        // in PROD ONLY. ChunkCache (PathFinder needs its methods), the projectile
        // entities, RandomPositionGenerator (AI), and EntityLookHelper (whose
        // Modern-Common version is an empty stub while FC's EntityLiving calls
        // new EntityLookHelper(this)).
        exclude 'btw/modern/ChunkCache.class'
        exclude 'btw/modern/EntityEgg.class'
        exclude 'btw/modern/EntityLargeFireball.class'
        exclude 'btw/modern/EntityWitherSkull.class'
        exclude 'btw/modern/RandomPositionGenerator.class'
        exclude 'btw/modern/EntityLookHelper.class'
        // Model rendering: real 1.5.2 classes replace stubs for correct UVs
        exclude 'btw/modern/ModelBox.class'
        exclude 'btw/modern/TexturedQuad.class'
        exclude 'btw/modern/PositionTextureVertex.class'
    }

    // FC classes SECOND: includes FC entity code (net.minecraft.src.btw.*)
    // AND remapped vanilla classes (net.minecraft.src.* → btw.modern.*).
    // For classes where Modern-Common already provides a bridge stub,
    // the FC version is excluded. For vanilla AI, pathfinding, etc.
    // where Modern-Common has no real implementation, the FC version
    // fills the gap with the REAL vanilla 1.5.2 code.
    from sourceSets.fc.output

    // Api module — just the FC-facing btw.api.* interfaces. These are
    // already shadow-relocated out of the FC bytecode, but some compiled
    // Forge-side code may still reference them at class-load time.
    from(project(':Api').sourceSets.main.output) {
        exclude 'btw/api/**' // same reason — Modern-Common is authoritative
    }

    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// The dist jar must contain the data-gen output — the loot/recipe rebalance
// (INTEGRATIONS #004/#005) lives in src/generated/resources, which is
// committed to git. Fail loudly if it's missing so a wiped tree can't
// silently ship a jar without the overrides. (Guard is on `jar`, not
// processResources, so runData itself can regenerate from an empty dir.)
tasks.named('jar').configure {
    doFirst {
        def genData = file('src/generated/resources/data')
        if (!genData.isDirectory() || (genData.list()?.length ?: 0) == 0) {
            throw new GradleException('Forge/src/generated/resources is missing or empty — ' +
                'the loot/recipe overrides (#004/#005) would not ship. Run: gradlew :Forge:runData')
        }
    }
}

repositories {
    // JEI
    maven {
        url 'https://maven.blamejared.com/'
    }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.3.0'
    implementation project(':Modern-Common')
    implementation project(':Api')

    // Mixin annotation processor — generates the refmap at compile time so
    // @Inject(method = "..."), @At(target = "..."), etc. get remapped from
    // MCP (dev) names to SRG names for the distributable jar. Without this
    // the mixin loader fails silently in production.
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'

    // JEI — optional runtime dependency. We compile against the API so
    // btw.forge.jei.* can reference JEI types, but the JEI plugin class
    // is only loaded by JEI itself when JEI is installed.
    def jeiVersion = '15.3.0.8'
    compileOnly fg.deobf("mezz.jei:jei-1.20.1-common-api:${jeiVersion}")
    compileOnly fg.deobf("mezz.jei:jei-1.20.1-forge-api:${jeiVersion}")
    // Needed at runtime for the dev client to actually load JEI so we can
    // visually verify the plugin.
    runtimeOnly fg.deobf("mezz.jei:jei-1.20.1-forge:${jeiVersion}")
}

// ============================================================
// Copy BTW textures to Forge assets with lowercase filenames.
// MC 1.20.1 rejects resource paths with uppercase characters.
// Source: build/btw-resources/textures/{blocks,items}/
// Dest:   src/main/resources/assets/betterthanwolves/textures/{block,item}/
// ============================================================

task copyBtwTextures {
    description = 'Copies BTW textures to Forge assets, lowercasing all filenames'
    group = 'btw'

    def blockSrc = file("${rootProject.projectDir}/build/btw-resources/textures/blocks")
    def itemSrc  = file("${rootProject.projectDir}/build/btw-resources/textures/items")
    def blockDst = file("src/main/resources/assets/betterthanwolves/textures/block")
    def itemDst  = file("src/main/resources/assets/betterthanwolves/textures/item")

    // Always run — incremental check is inside doLast (timestamp-based)
    outputs.upToDateWhen { false }

    doLast {
        blockDst.mkdirs()
        itemDst.mkdirs()

        def copyLowercase = { File srcDir, File dstDir ->
            int count = 0
            if (srcDir.exists()) {
                srcDir.eachFile { f ->
                    if (f.name.endsWith('.png')) {
                        def lower = f.name.toLowerCase()
                        def dest = new File(dstDir, lower)
                        if (!dest.exists() || f.lastModified() > dest.lastModified()) {
                            dest.bytes = f.bytes
                            count++
                        }
                    }
                }
            }
            return count
        }

        def blocks = copyLowercase(blockSrc, blockDst)
        def items  = copyLowercase(itemSrc, itemDst)
        logger.lifecycle("Copied ${blocks} block textures + ${items} item textures (lowercased)")
    }
}

// Also lowercase all texture references inside model JSONs
task lowercaseModelRefs {
    description = 'Lowercases texture path references in model JSON files'
    group = 'btw'
    dependsOn copyBtwTextures

    def modelsDir = file("src/main/resources/assets/betterthanwolves/models")
    inputs.dir(modelsDir)
    outputs.dir(modelsDir)

    doLast {
        int fixed = 0
        modelsDir.eachFileRecurse { f ->
            if (f.name.endsWith('.json')) {
                def text = f.text
                // Lowercase texture paths: "betterthanwolves:block/SomeName" → "betterthanwolves:block/somename"
                def updated = text.replaceAll('"betterthanwolves:(block|item)/([^"]*)"') { match, type, name ->
                    '"betterthanwolves:' + type + '/' + name.toLowerCase() + '"'
                }
                if (updated != text) {
                    f.text = updated
                    fixed++
                }
            }
        }
        logger.lifecycle("Lowercased texture refs in ${fixed} model JSON files")
    }
}

// Run before processResources so textures are in place for the build
processResources.dependsOn lowercaseModelRefs

// Template placeholders in META-INF/mods.toml so users can see which
// upstream BTW build is embedded. We use a targeted string-replace
// rather than Groovy's expand() because ${file.jarVersion} is handled
// by Forge's mod-loading runtime — expand() would try to resolve it
// at build time and fail.
processResources {
    def replacements = [
        '${btw_version}'     : project.btwVersion,
        '${port_version}'    : project.portVersion,
        '${port_mc_version}' : project.portMcVersion,
    ]
    inputs.properties(replacements.collectEntries { k, v -> [(k): v] })
    filesMatching('META-INF/mods.toml') {
        filter { String line ->
            replacements.inject(line) { acc, k, v -> acc.replace(k, v) }
        }
    }
}

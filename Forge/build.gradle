buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'org.ow2.asm:asm:9.6'
    }
}

apply plugin: 'java'
apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'org.spongepowered.mixin'
apply plugin: 'com.github.johnrengelman.shadow'

import com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar
import org.objectweb.asm.ClassReader
import org.objectweb.asm.ClassWriter
import org.objectweb.asm.Opcodes
import org.objectweb.asm.ClassVisitor
import org.objectweb.asm.FieldVisitor
import org.objectweb.asm.MethodVisitor

evaluationDependsOn(':Api')
evaluationDependsOn(':Modern-Common')

// ---- Port version wiring ------------------------------------
// The Forge module has its own SemVer (the "port" version), distinct
// from the upstream BTW / 1.5.2 modVersion. Jar name and mods.toml both
// read from this.
version = project.portVersion
// Jar layout: BetterThanWolves-1.20.1-0.1.0-alpha.1.jar
base {
    archivesName = "${project.portArchiveName}-${project.portMcVersion}"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

// Define source sets BEFORE minecraft {} so 'fc' is available in mods {} block
sourceSets {
    main {
        java.srcDirs = ['src/main/java']
        // Generated data (loot tables, recipes, tags) ride on the main
        // resources output. Datapack providers write into
        // src/generated/resources/ via `runData`; we keep it as an
        // additional resource srcDir so the gen output is packaged
        // into the jar alongside hand-authored resources.
        resources.srcDirs = ['src/main/resources', 'src/generated/resources']
    }
    // FC source set — holds remapped FC class files so ForgeGradle's
    // TRANSFORMER classloader includes them in the mod's module layer.
    fc {
        resources.srcDirs = []
    }
}

// Generate the mixin refmap so method/field references in @Inject/@At
// annotations get remapped from MCP names (dev) to SRG names (prod jar).
mixin {
    add sourceSets.main, 'betterthanwolves.refmap.json'
    config 'betterthanwolves.mixins.json'
}

minecraft {
    mappings channel: 'official', version: '1.20.1'

    runs {
        server {
            workingDirectory project.file('run/server')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${project.projectDir}/build/createSrgToMcp/output.srg"
            arg '--mixin.config=betterthanwolves.mixins.json'
            // Disable HotSpot's fast-throw NPE optimization. After ~15
            // exceptions at the same bytecode location, the JIT starts
            // throwing pre-allocated NPE instances with EMPTY stack
            // traces, making caught exceptions unactionable. With FC
            // bridge code triggering tight per-tick exception loops,
            // this is essential for diagnosis.
            jvmArg '-XX:-OmitStackTraceInFastThrow'
            mods {
                betterthanwolves {
                    source sourceSets.main
                    source project(':Api').sourceSets.main
                    // FC source set BEFORE Modern-Common: vanilla 1.5.2
                    // Entity / AxisAlignedBB live in fc and must take
                    // precedence over Modern-Common's stubs of the same
                    // class names. ForgeGradle / TRANSFORMER classloader
                    // resolves duplicates by source declaration order.
                    source sourceSets.fc
                    source project(':Modern-Common').sourceSets.main
                }
            }
        }
        client {
            workingDirectory project.file('run/client')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            property 'mixin.env.remapRefMap', 'true'
            property 'mixin.env.refMapRemappingFile', "${project.projectDir}/build/createSrgToMcp/output.srg"
            arg '--mixin.config=betterthanwolves.mixins.json'
            // See server { } block — needed so caught NPEs in tight
            // tick loops still carry their stack trace.
            jvmArg '-XX:-OmitStackTraceInFastThrow'
            mods {
                betterthanwolves {
                    source sourceSets.main
                    source project(':Api').sourceSets.main
                    // FC source set BEFORE Modern-Common: vanilla 1.5.2
                    // Entity / AxisAlignedBB live in fc and must take
                    // precedence over Modern-Common's stubs of the same
                    // class names. ForgeGradle / TRANSFORMER classloader
                    // resolves duplicates by source declaration order.
                    source sourceSets.fc
                    source project(':Modern-Common').sourceSets.main
                }
            }
        }
        // Data-gen run: `gradlew :Forge:runData` invokes our
        // GatherDataEvent subscriber. Generated datapack content lands in
        // src/generated/resources/ and is then picked up by the main
        // resources srcDir (see sourceSets { main { resources } }).
        data {
            workingDirectory project.file('run/data')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            args '--mod', 'betterthanwolves', '--all',
                 '--output', file('src/generated/resources/'),
                 '--existing', file('src/main/resources/')
            mods {
                betterthanwolves {
                    source sourceSets.main
                    source project(':Api').sourceSets.main
                    source sourceSets.fc
                    source project(':Modern-Common').sourceSets.main
                }
            }
        }
    }
}

// --- Shadow: remap FC bytecode btw.api.* -> btw.modern.* ---

task remapFcCode(type: ShadowJar) {
    description = 'Remaps btw.api.* to btw.modern.* in FC code and packages it'
    archiveBaseName = 'fc-remapped'
    archiveClassifier = ''
    // No version in the name: versioned jars accumulated in build/remapped
    // across version bumps, and extractFcClasses (first-in-wins) extracted
    // the OLDEST jar's classes over the current build's.
    archiveVersion = ''
    destinationDirectory = file("$buildDir/remapped")

    // FC code from the subproject modules
    from(project(':Client').sourceSets.main.output) { exclude 'btw/api/**' }
    from(project(':Common').sourceSets.main.output) { exclude 'btw/api/**' }
    from(project(':Server').sourceSets.main.output) { exclude 'btw/api/**' }

    // Vanilla MC 1.5.2 AI/pathfinding classes (with FC patches) from the
    // root project. Only include classes that Modern-Common has as dead
    // stubs — EntityAI*, Path*, EntityLookHelper, EntitySenses, plus
    // supporting classes they depend on (RandomPositionGenerator, etc.).
    // Do NOT include Block, Entity, World, Minecraft, etc. — Modern-Common
    // provides bridge implementations for those.
    from(rootProject.file('build/classes/java/main')) {
        include 'net/minecraft/src/EntityAI*.class'
        exclude 'net/minecraft/src/EntityAITasks*.class'
        include 'net/minecraft/src/PathNavigate*.class'
        include 'net/minecraft/src/PathEntity*.class'
        include 'net/minecraft/src/PathPoint*.class'
        include 'net/minecraft/src/PathFinder*.class'
        // EntitySenses excluded — Modern-Common provides a bridge stub
        // with canSee()=true (needed so AI targeting works).
        // EntityLookHelper is now included (stub was deleted from dev
        // classpath; vanilla version has the (EntityLiving) constructor
        // that EntityLiving.<init> calls).
        include 'net/minecraft/src/EntityLookHelper*.class'
        include 'net/minecraft/src/EntityMoveHelper*.class'
        include 'net/minecraft/src/EntityJumpHelper*.class'
        include 'net/minecraft/src/RandomPositionGenerator*.class'
        include 'net/minecraft/src/MCHash*.class'
        include 'net/minecraft/src/IntHash*.class'
        include 'net/minecraft/src/IEntitySelector*.class'
        // FC's vanilla 1.5.2 Entity — has the canonical moveEntity
        // collision-clip + step-up + updateFallState that we need.
        // Modern-Common's Entity stub is deleted post-compile by
        // removeModernCommonShadowedClasses so the vanilla version wins.
        //
        // EntityLiving is ALSO swapped so that vanilla's real
        // writeEntityToNBT / readEntityFromNBT actually persist health,
        // motion, combat state, etc. A no-op stub would make the NBT
        // save path "succeed" but silently lose state on load.
        // Access-level conflicts (protected fields accessed cross-class)
        // are fixed by openUpEntityAccess running ASM promotion.
        //
        // NOT swapped:
        //   - AxisAlignedBB: vanilla has PROTECTED constructor, FC code
        //     calls `new AxisAlignedBB(...)` directly and would fail.
        include 'net/minecraft/src/Entity.class'
        include 'net/minecraft/src/EntityLiving.class'
        // EntityCreature and EntityMob carry FCMOD helper methods
        // (EntityCreatureEntityInit, CheckForCatchFireInSun, etc.)
        // that FC subclasses call directly to bypass virtual dispatch.
        // Must be the vanilla versions so those helpers resolve.
        include 'net/minecraft/src/EntityCreature.class'
        include 'net/minecraft/src/EntityMob.class'
        // EntityAgeable and EntityAnimal carry FCMOD helpers used by
        // FCEntityPig/Cow/Sheep/Chicken/Wolf — GetHungerLevel(),
        // SetHungerLevel(), IsTemptingItem(), grazing animation state,
        // etc. — backed by DataWatcher slot 21. FC render code
        // (FCEntityPig.getTexture) calls GetHungerLevel() to switch
        // between fed/hungry textures.
        include 'net/minecraft/src/EntityAgeable.class'
        include 'net/minecraft/src/EntityAnimal.class'
        // Concrete mob/animal classes — Modern-Common's stubs don't call
        // setSize in their constructors, so vanilla 1.5.2 EntityAgeable's
        // sentinel `m_fAdultWidth = -1.0F` never gets overwritten, and
        // readEntityFromNBT → setGrowingAge → AdjustedSizeToScale eventually
        // calls setSize(-1.0, 0.0) which corrupts the bounding box and
        // makes the entity fall through everything.
        include 'net/minecraft/src/EntityPig.class'
        include 'net/minecraft/src/EntityCow.class'
        include 'net/minecraft/src/EntitySheep.class'
        include 'net/minecraft/src/EntityChicken.class'
        include 'net/minecraft/src/EntityWolf.class'
        include 'net/minecraft/src/EntityOcelot.class'
        include 'net/minecraft/src/EntityMooshroom.class'
        include 'net/minecraft/src/EntityVillager.class'
        include 'net/minecraft/src/EntityZombie.class'
        include 'net/minecraft/src/EntitySkeleton.class'
        include 'net/minecraft/src/EntityCreeper.class'
        include 'net/minecraft/src/EntityEnderman.class'
        include 'net/minecraft/src/EntitySpider.class'
        include 'net/minecraft/src/EntityCaveSpider.class'
        include 'net/minecraft/src/EntityWitch.class'
        include 'net/minecraft/src/EntityPigZombie.class'
        include 'net/minecraft/src/EntityWither.class'
        include 'net/minecraft/src/EntitySlime.class'
        include 'net/minecraft/src/EntityMagmaCube.class'
        include 'net/minecraft/src/EntityGhast.class'
        include 'net/minecraft/src/EntityBlaze.class'
        include 'net/minecraft/src/EntitySilverfish.class'
        include 'net/minecraft/src/EntityBat.class'
        include 'net/minecraft/src/EntitySquid.class'
        include 'net/minecraft/src/EntitySnowman.class'
        include 'net/minecraft/src/EntityIronGolem.class'
        include 'net/minecraft/src/EntityAmbientCreature.class'
        include 'net/minecraft/src/EntityWaterMob.class'
        include 'net/minecraft/src/EntityGolem.class'
        include 'net/minecraft/src/EntityFlying.class'
        include 'net/minecraft/src/EntityTameable.class'
        // Direct Entity subclasses — vanilla 1.5.2 declares writeEntityToNBT
        // and readEntityFromNBT abstract on Entity, so the Modern-Common
        // stubs (which inherit them as abstract) hit AbstractMethodError
        // every time FCEntityStateCodec or ProxyEntity tries to serialize
        // them for save/sync. Swap to vanilla so the real impls are present.
        include 'net/minecraft/src/EntityArrow.class'
        include 'net/minecraft/src/EntityBoat.class'
        include 'net/minecraft/src/EntityFX.class'
        include 'net/minecraft/src/EntityFallingSand.class'
        include 'net/minecraft/src/EntityFireball.class'
        include 'net/minecraft/src/EntityFishHook.class'
        include 'net/minecraft/src/EntityItem.class'
        include 'net/minecraft/src/EntityMinecart.class'
        include 'net/minecraft/src/EntityPainting.class'
        include 'net/minecraft/src/EntityTNTPrimed.class'
        include 'net/minecraft/src/EntityThrowable.class'
        include 'net/minecraft/src/EntityWeatherEffect.class'
        include 'net/minecraft/src/EntityXPOrb.class'
        include 'net/minecraft/src/FCEntityLightningBolt.class'
        // FCEntityLightningBolt extends EntityLightningBolt, which extends
        // EntityWeatherEffect. ModelBat uses reflection to look up methods
        // on EntityLightningBolt, so the class must be loadable.
        include 'net/minecraft/src/EntityLightningBolt.class'
        // FCMOD utility classes referenced by vanilla 1.5.2 entity code:
        //   - FCUtilsWorld: EntityLiving.getSpeedModifier (mud/path/water slowdowns)
        //   - FCUtilsMisc: EntityAnimal/EntityAgeable behaviour helpers
        // Modern-Common doesn't stub these, so the real vanilla versions
        // get pulled in via remap.
        include 'net/minecraft/src/FCUtilsWorld.class'
        include 'net/minecraft/src/FCUtilsMisc.class'
        // Vanilla EntityLiving references CombatTracker to record damage
        // events used by death messages and statistics. CombatTracker
        // depends on DamageSource — we leave DamageSource as Modern-
        // Common's stub (compatible signature).
        include 'net/minecraft/src/CombatTracker.class'
        include 'net/minecraft/src/CombatEntry.class'
        // Vanilla EntityLiving constructor creates EntityBodyHelper.
        // Modern-Common has no stub, so include vanilla's directly.
        include 'net/minecraft/src/EntityBodyHelper.class'
        // Vanilla EntityLiving.CheckForHeadDrop() and .attackEntityFrom()
        // reference FCDamageSourceCustom static fields (m_DamageSourceChoppingBlock
        // etc.). The vanilla 1.5.2 class is a flat DamageSource subclass;
        // it depends only on DamageSource (already stubbed in Modern-Common).
        include 'net/minecraft/src/FCDamageSourceCustom.class'
        // Vanilla EntityMob implements IMob. IMob has a static-final
        // FilterIMob field. Both must be present so EntityMob loads.
        include 'net/minecraft/src/IMob.class'
        include 'net/minecraft/src/FilterIMob.class'
        // Tag interfaces implemented by various vanilla 1.5.2 mob classes:
        //   - IBossDisplayData: EntityWither, EntityDragon
        //   - INpc, IMerchant: EntityVillager
        // Without them the mob classes fail to link.
        include 'net/minecraft/src/IBossDisplayData.class'
        include 'net/minecraft/src/INpc.class'
        include 'net/minecraft/src/IMerchant.class'
        // Projectile subclasses referenced by vanilla mob classes:
        //   - EntitySmallFireball: EntityBlaze.shoots, EntityGhast hit code
        //   - EntityLargeFireball: EntityGhast.shoots
        //   - EntityWitherSkull:   EntityWither.shoots
        //   - FCEntityWitherSkull: vanilla EntityWither.java:479 directly
        //     instantiates this FC subclass via `new FCEntityWitherSkull(...)`
        include 'net/minecraft/src/EntitySmallFireball.class'
        include 'net/minecraft/src/EntityLargeFireball.class'
        include 'net/minecraft/src/EntityWitherSkull.class'
        // Vanilla 1.5.2 has FCMOD-patched subclass relationships where the
        // original vanilla class extends an FC subclass:
        //   - EntityMooshroom extends FCEntityCow
        //   - EntityPigZombie extends FCEntityZombie
        //   - EntityMagmaCube extends FCEntitySlime
        // So when we swap the vanilla parent, we MUST also bring in the
        // FCEntity* version to satisfy the linker. Plus EntityWither has
        // EntityWitherAttackFilter as a static-final field. The shotgun
        // include below brings in every FCEntity*.class from Src/ — they
        // all relocate cleanly into btw.modern.* and only depend on classes
        // we already have.
        include 'net/minecraft/src/FCEntity*.class'
        include 'net/minecraft/src/EntityWitherAttackFilter.class'
        // EntitySheep instantiates `new ContainerSheep(this)` for crafting.
        // Container itself is a Modern-Common stub; ContainerSheep is a
        // tiny vanilla subclass of Container.
        include 'net/minecraft/src/ContainerSheep.class'
        // Thrown projectile subclasses spawned by various mobs:
        //   - EntitySnowball: EntitySnowman
        //   - EntityEgg: EntityChicken (random egg drop)
        //   - EntityEnderPearl: EntityEnderman
        //   - EntityExpBottle: villager XP throw
        include 'net/minecraft/src/EntitySnowball.class'
        include 'net/minecraft/src/EntityEgg.class'
        include 'net/minecraft/src/EntityEnderPearl.class'
        include 'net/minecraft/src/EntityExpBottle.class'
        // Tuple is a small generic pair helper used by EntityVillager's
        // trade randomizer (and some other vanilla 1.5.2 code).
        include 'net/minecraft/src/Tuple.class'
        // ChunkCache is a read-only IBlockAccess used by PathFinder for
        // A* pathfinding. Vanilla World.getEntityPathToXYZ creates one
        // and passes it to PathFinder.createEntityPathTo.
        // Path is the internal priority queue used by PathFinder.
        include 'net/minecraft/src/ChunkCache.class'
        include 'net/minecraft/src/Path.class'
        include 'net/minecraft/src/ModelBox.class'
        include 'net/minecraft/src/TexturedQuad.class'
        include 'net/minecraft/src/PositionTextureVertex.class'
        include 'net/minecraft/src/ContainerMerchant.class'
        include 'net/minecraft/src/ContainerFurnace.class'
        include 'net/minecraft/src/ContainerDispenser.class'
        include 'net/minecraft/src/ContainerHopper.class'
        include 'net/minecraft/src/ContainerBrewingStand.class'
        include 'net/minecraft/src/ContainerBeacon.class'
        include 'net/minecraft/src/ContainerRepair.class'
        include 'net/minecraft/src/ContainerEnchantment.class'
        include 'net/minecraft/src/ContainerChest.class'
        include 'net/minecraft/src/InventoryMerchant.class'
        include 'net/minecraft/src/SlotMerchantResult.class'
        include 'net/minecraft/src/SlotFurnace.class'
        include 'net/minecraft/src/SlotBrewingStandPotion.class'
        include 'net/minecraft/src/SlotBrewingStandIngredient.class'
        include 'net/minecraft/src/SlotArmor.class'
        include 'net/minecraft/src/SlotCrafting.class'
        // Frozen Entity.setFire() calls EnchantmentProtection.func_92093_a and
        // EntityLiving.MeleeAttack calls EnchantmentThorns.func_92096_a
        // UNCONDITIONALLY — without these classes the first burning zombie /
        // first mob melee hit raises NoClassDefFoundError (link-audit P0).
        include 'net/minecraft/src/EnchantmentProtection.class'
        include 'net/minecraft/src/EnchantmentThorns.class'
        // EntityPainting extends EntityHanging; FCEntityCanvas.onValidSurface
        // does `instanceof EntityPainting`, which loads the superclass chain.
        include 'net/minecraft/src/EntityHanging.class'
        // EntityMinecart.createMinecart news all six subclasses; reachable via
        // FCItemMinecart.OnItemUsedByBlockDispenser (Block Dispenser).
        include 'net/minecraft/src/EntityMinecartEmpty.class'
        include 'net/minecraft/src/EntityMinecartChest.class'
        include 'net/minecraft/src/EntityMinecartFurnace.class'
        include 'net/minecraft/src/EntityMinecartHopper.class'
        include 'net/minecraft/src/EntityMinecartTNT.class'
        include 'net/minecraft/src/EntityMinecartMobSpawner.class'
        include 'net/minecraft/src/EntityMinecartContainer.class'
        include 'net/minecraft/src/EntityMinecartMobSpawnerLogic.class'
        include 'net/minecraft/src/MobSpawnerBaseLogic.class'
        include 'net/minecraft/src/WeightedRandomMinecart.class'
        // Crash-report Callables used by EntityLiving.updatePotionEffects'
        // catch block — without them a potion-tick exception is masked by
        // NoClassDefFoundError instead of producing the real crash report.
        include 'net/minecraft/src/CallableEffect*.class'
    }
    from(rootProject.file('build/classes/java/server')) {
        include 'net/minecraft/src/EntityAI*.class'
        exclude 'net/minecraft/src/EntityAITasks*.class'
        include 'net/minecraft/src/PathNavigate*.class'
        include 'net/minecraft/src/PathEntity*.class'
        include 'net/minecraft/src/PathPoint*.class'
        include 'net/minecraft/src/PathFinder*.class'
        // EntitySenses excluded — Modern-Common provides a bridge stub
        // with canSee()=true (needed so AI targeting works).
        // EntityLookHelper is now included (stub was deleted from dev
        // classpath; vanilla version has the (EntityLiving) constructor
        // that EntityLiving.<init> calls).
        include 'net/minecraft/src/EntityLookHelper*.class'
        include 'net/minecraft/src/EntityMoveHelper*.class'
        include 'net/minecraft/src/EntityJumpHelper*.class'
        include 'net/minecraft/src/RandomPositionGenerator*.class'
        include 'net/minecraft/src/MCHash*.class'
        include 'net/minecraft/src/IntHash*.class'
        include 'net/minecraft/src/IEntitySelector*.class'
        // See client comment above.
        include 'net/minecraft/src/Entity.class'
        include 'net/minecraft/src/EntityLiving.class'
        // EntityCreature and EntityMob carry FCMOD helper methods
        // (EntityCreatureEntityInit, CheckForCatchFireInSun, etc.)
        // that FC subclasses call directly to bypass virtual dispatch.
        // Must be the vanilla versions so those helpers resolve.
        include 'net/minecraft/src/EntityCreature.class'
        include 'net/minecraft/src/EntityMob.class'
        // EntityAgeable and EntityAnimal carry FCMOD helpers used by
        // FCEntityPig/Cow/Sheep/Chicken/Wolf — GetHungerLevel(),
        // SetHungerLevel(), IsTemptingItem(), grazing animation state,
        // etc. — backed by DataWatcher slot 21. FC render code
        // (FCEntityPig.getTexture) calls GetHungerLevel() to switch
        // between fed/hungry textures.
        include 'net/minecraft/src/EntityAgeable.class'
        include 'net/minecraft/src/EntityAnimal.class'
        // Concrete mob/animal classes — Modern-Common's stubs don't call
        // setSize in their constructors, so vanilla 1.5.2 EntityAgeable's
        // sentinel `m_fAdultWidth = -1.0F` never gets overwritten, and
        // readEntityFromNBT → setGrowingAge → AdjustedSizeToScale eventually
        // calls setSize(-1.0, 0.0) which corrupts the bounding box and
        // makes the entity fall through everything.
        include 'net/minecraft/src/EntityPig.class'
        include 'net/minecraft/src/EntityCow.class'
        include 'net/minecraft/src/EntitySheep.class'
        include 'net/minecraft/src/EntityChicken.class'
        include 'net/minecraft/src/EntityWolf.class'
        include 'net/minecraft/src/EntityOcelot.class'
        include 'net/minecraft/src/EntityMooshroom.class'
        include 'net/minecraft/src/EntityVillager.class'
        include 'net/minecraft/src/EntityZombie.class'
        include 'net/minecraft/src/EntitySkeleton.class'
        include 'net/minecraft/src/EntityCreeper.class'
        include 'net/minecraft/src/EntityEnderman.class'
        include 'net/minecraft/src/EntitySpider.class'
        include 'net/minecraft/src/EntityCaveSpider.class'
        include 'net/minecraft/src/EntityWitch.class'
        include 'net/minecraft/src/EntityPigZombie.class'
        include 'net/minecraft/src/EntityWither.class'
        include 'net/minecraft/src/EntitySlime.class'
        include 'net/minecraft/src/EntityMagmaCube.class'
        include 'net/minecraft/src/EntityGhast.class'
        include 'net/minecraft/src/EntityBlaze.class'
        include 'net/minecraft/src/EntitySilverfish.class'
        include 'net/minecraft/src/EntityBat.class'
        include 'net/minecraft/src/EntitySquid.class'
        include 'net/minecraft/src/EntitySnowman.class'
        include 'net/minecraft/src/EntityIronGolem.class'
        include 'net/minecraft/src/EntityAmbientCreature.class'
        include 'net/minecraft/src/EntityWaterMob.class'
        include 'net/minecraft/src/EntityGolem.class'
        include 'net/minecraft/src/EntityFlying.class'
        include 'net/minecraft/src/EntityTameable.class'
        // Direct Entity subclasses — vanilla 1.5.2 declares writeEntityToNBT
        // and readEntityFromNBT abstract on Entity, so the Modern-Common

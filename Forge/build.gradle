        include 'net/minecraft/src/EntityArrow.class'
        include 'net/minecraft/src/EntityBoat.class'
        include 'net/minecraft/src/EntityFX.class'
        include 'net/minecraft/src/EntityFallingSand.class'
        include 'net/minecraft/src/EntityFireball.class'
        include 'net/minecraft/src/EntityFishHook.class'

        include 'net/minecraft/src/EntityLightningBolt.class'
        // FCMOD utility classes referenced by vanilla 1.5.2 entity code:
        //   - FCUtilsWorld: EntityLiving.getSpeedModifier (mud/path/water slowdowns)
